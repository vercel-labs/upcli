name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Verify release version
        run: |
          version="v$(node -p "require('./packages/cli/package.json').version")"
          case "$GITHUB_REF_NAME" in
            "$version"|"$version"-*) ;;
            *) echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2; exit 1 ;;
          esac

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and build
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Prepare release asset
        run: |
          mkdir release
          cp packages/cli/dist/cli.js release/up.mjs
          cp packages/cli/LICENSE release/LICENSE
          cd release
          sha256sum up.mjs > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" release/up.mjs release/checksums.txt release/LICENSE "${flags[@]}" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
