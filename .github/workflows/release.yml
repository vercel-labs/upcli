name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Required for npm trusted publishing (OIDC). The npm package `up` is
  # configured on npmjs.com to accept publishes only from this repository's
  # release.yml workflow; no npm token exists or is needed.
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: pnpm
          # Point npm at the public registry so trusted publishing targets it.
          registry-url: https://registry.npmjs.org

      - name: Verify release version
        run: |
          version="v$(node -p "require('./packages/cli/package.json').version")"
          case "$GITHUB_REF_NAME" in
            "$version"|"$version"-*) ;;
            *) echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2; exit 1 ;;
          esac

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and build
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish to npm
        working-directory: packages/cli
        run: |
          # Trusted publishing needs npm >= 11.5.1; runner images may lag.
          npm install -g npm@^11
          # Publish only when the tag is exactly v<package.json version>. A
          # suffixed tag (e.g. v2.0.0-rc.1 while package.json says 2.0.0) must
          # never publish 2.0.0. Prerelease versions go to the `beta` dist-tag
          # so `npm install up` keeps resolving to the latest stable.
          version="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "Tag $GITHUB_REF_NAME is not exactly v$version; skipping npm publish."
            exit 0
          fi
          case "$version" in
            *-*) npm publish --tag beta ;;
            *) npm publish ;;
          esac

      - name: Prepare release asset
        run: |
          mkdir release
          cp packages/cli/dist/cli.js release/up.mjs
          cp packages/cli/LICENSE release/LICENSE
          cd release
          sha256sum up.mjs > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" release/up.mjs release/checksums.txt release/LICENSE "${flags[@]}" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
